name: WorkStamp
options:
  bundleIdPrefix: com.toy
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
targets:
  WorkStamp:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - target: WorkStampWidget
    entitlements:
      path: WorkStamp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.toy.workstamp
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 출근도장
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toy.workstamp
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
  WorkStampWidget:
    type: app-extension
    platform: iOS
    sources:
      - WidgetSources
      - Sources/Shared
    entitlements:
      path: WorkStampWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.toy.workstamp
    info:
      path: WidgetSources/Info.plist
      properties:
        CFBundleDisplayName: 출근도장
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toy.workstamp.widget
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
  WorkStampMac:
    type: application
    platform: macOS
    sources:
      - MacSources
      - Sources/Shared
    info:
      path: MacSources/Info.plist
      properties:
        CFBundleDisplayName: 출근도장
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toy.workstamp.mac
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CODE_SIGN_IDENTITY: "-"
